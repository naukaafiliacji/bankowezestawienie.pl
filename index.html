<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porównywarka Kont Osobistych - Najlepsze Konta Bankowe</title>
    <!-- Profesjonalny podział na zewnętrzne zasoby (cache-friendly) -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Porównywarka Kont Osobistych</h1>
        <p>Wprowadź swoje nawyki finansowe, aby znaleźć najtańsze konto dopasowane do Ciebie.</p>
    </header>

    <!-- Panel Filtrowania -->
    <div class="filter-panel">
        <div class="filter-group">
            <label for="monthly-income">Miesięczne wpływy (PLN)</label>
            <input type="number" id="monthly-income" value="2000" min="0">
        </div>
        <div class="filter-group">
            <label for="card-transactions">Płatności kartą/BLIK (PLN/mies)</label>
            <input type="number" id="card-transactions" value="400" min="0">
        </div>
        <div class="filter-group">
            <label for="user-age">Twój wiek</label>
            <input type="number" id="user-age" value="25" min="0">
        </div>
        <div class="filter-group">
            <label for="atm-requirement">Wypłaty z bankomatów</label>
            <select id="atm-requirement">
                <option value="any">Dowolne</option>
                <option value="free-all">Tylko darmowe wszystkie w PL</option>
            </select>
        </div>
    </div>

    <!-- Lista Banków -->
    <div class="results-list" id="banks-container">
        <!-- Karty banków generowane dynamicznie przez skrypt JS -->
    </div>
</div>

<!-- Ładowanie bazy danych i logiki aplikacji na samym końcu body -->
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
